<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Happy Birthday My Love Anita</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}body{background:linear-gradient(#0a0122,#ff4b8b);color:#fff;overflow:hidden}.card{max-width:420px;margin:40px auto;background:rgba(255,255,255,.12);padding:20px;border-radius:20px;text-align:center}img{width:220px;height:220px;border-radius:16px;border:4px solid #fff;object-fit:cover}button{padding:12px 20px;border:none;border-radius:30px;background:#ff2f7d;color:#fff;margin-top:15px}#cake,#letter{display:none}#cake{font-size:80px} .fire{position:fixed;font-size:24px;animation:b 1.5s forwards}@keyframes b{to{transform:translateY(-180px) scale(2);opacity:0}}</style></head><body><div class="card"><h1>🎉 Happy Birthday</h1><h2>My Love Anita ❤️</h2><img id="pic" src="PHOTO1.jpg"><div id="cake">🎂</div><button onclick="go()">Open My Surprise</button><div id="letter"><h3>💌 My Dearest Anita</h3><p>Happy Birthday! Wishing you happiness, smiles and success always.</p><p><b>Forever Yours,<br>Anand ❤️</b></p></div></div><script>const a=["PHOTO1.jpg","PHOTO2.jpg"];let i=0;setInterval(()=>{i=(i+1)%2;pic.src=a[i]},3000);let s=0;function go(){if(s==0){cake.style.display="block";event.target.innerHTML="🕯 Blow Candle";s=1;}else{for(let k=0;k<50;k++){let d=document.createElement("div");d.className="fire";d.innerHTML=["🎆","✨","🎉","💖"][Math.floor(Math.random()*4)];d.style.left=Math.random()*100+"vw";d.style.top=Math.random()*100+"vh";document.body.appendChild(d);setTimeout(()=>d.remove(),1500);}letter.style.display="block";event.target.innerHTML="🎂 Happy Birthday Anita ❤️";}}</script></body></html>
