<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Love Anita ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
overflow:hidden;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#09001f,#22003b,#ff2f7d);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://raw.githubusercontent.com/VincentGarreau/particles.js/master/demo/media/star.png");
animation:move 60s linear infinite;
opacity:.35;
}

@keyframes move{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

.card{
width:90%;
max-width:420px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
border-radius:25px;
padding:25px;
text-align:center;
box-shadow:0 0 30px rgba(255,255,255,.2);
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}

h1{
font-size:38px;
color:#ffd700;
text-shadow:0 0 20px gold;
}

h2{
margin-top:10px;
color:#fff;
font-size:28px;
}

img{
width:220px;
height:220px;
object-fit:cover;
border-radius:20px;
margin:20px auto;
display:block;
border:4px solid white;
box-shadow:0 0 25px hotpink;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:40px;
background:#ff2f7d;
color:white;
cursor:pointer;
margin-top:15px;
}

button:hover{
transform:scale(1.08);
}

.heart{
position:absolute;
font-size:24px;
animation:fly 8s linear infinite;
}

@keyframes fly{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="heart" style="left:10%;animation-delay:0s;">❤️</div>
<div class="heart" style="left:30%;animation-delay:2s;">💖</div>
<div class="heart" style="left:50%;animation-delay:4s;">💕</div>
<div class="heart" style="left:70%;animation-delay:1s;">💗</div>
<div class="heart" style="left:90%;animation-delay:3s;">❤️</div>

<div class="card">

<h1>🎉 Happy Birthday 🎉</h1>

<h2>My Love Anita ❤️</h2>

<img id="photo" src="PHOTO1">

<p style="font-size:20px;margin-top:15px;">
Forever Yours,<br>
<b>Anand ❤️</b>
</p>

<button onclick="next()">Open My Surprise 💖</button>

</div>

<script>

const photos=[
"PHOTO1",
"PHOTO2"
];

let i=0;

setInterval(()=>{
i=(i+1)%photos.length;
document.getElementById("photo").src=photos[i];
},3000);

function next(){
alert("🎂 Surprise Coming In Part 2 ❤️");
}

</script>

</body>
</html>
